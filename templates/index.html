<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Report Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-light: #f9f9f9;
      --bg-dark: #121212;
      --text-light: #111;
      --text-dark: #eee;
      --box-light: #e6e6e6;
      --box-dark: #2a2a2a;
      --input-light: #fff;
      --input-dark: #1e1e1e;
      --primary: #10a37f;
      --radius: 12px;
    }

    [data-theme="light"] {
      background-color: var(--bg-light);
      color: var(--text-light);
    }

    [data-theme="dark"] {
      background-color: var(--bg-dark);
      color: var(--text-dark);
    }

    body {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background-color 0.3s, color 0.3s;
    }

    header {
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ccc;
    }

    header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    }

    .theme-toggle {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      color: inherit;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .left-panel {
      width: 300px;
      border-right: 1px solid #ccc;
      padding: 1.5rem;
      box-sizing: border-box;
      font-weight: 600;
    }

    .left-panel textarea {
      width: 100%;
      height: 100%;
      min-height: 300px;
      padding: 1rem;
      border-radius: var(--radius);
      border: none;
      resize: vertical;
      background-color: var(--input-light);
      color: var(--text-light);
      font-weight: 400;
    }

    [data-theme="dark"] .left-panel textarea {
      background-color: var(--input-dark);
      color: var(--text-dark);
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2rem;
    }

    .input-section {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .input-section input[type="text"] {
      flex: 1;
      padding: 1rem;
      border-radius: var(--radius);
      border: none;
      background-color: var(--input-light);
      color: var(--text-light);
    }

    [data-theme="dark"] .input-section input[type="text"] {
      background-color: var(--input-dark);
      color: var(--text-dark);
    }

    button {
      background-color: var(--primary);
      color: white;
      padding: 1rem 1.5rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
    }

    .writing-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    color: white;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    text-align: center;
    padding: 2rem;
    }

    .writing-title {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 1rem;
    }

    .writing-subtitle {
    font-size: 1rem;
    font-weight: 400;
    color: #ccc;
    }

    .blinking::after {
    content: '...';
    animation: blink 1.2s steps(2, start) infinite;
    }

    @keyframes blink {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
    }


    @media (max-width: 768px) {
      .main {
        flex-direction: column;
      }

      .left-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #ccc;
      }

      .input-section {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Report Generator</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 / ☀️</button>
  </header>

  <div class="main">
    <div class="left-panel">
      <label for="user_instructions"><strong>User Instructions</strong></label>
      <textarea id="user_instructions" placeholder="Add instructions here...">1. More facts and reviews.
2. Tabular representation for visual ease.</textarea>
    </div>

    <div class="chat-area">
      <div class="input-section">
        <input type="text" id="topic" placeholder="Enter topic..." value="Alzheimer disease seen through the lens of sex and gender.">
        <button onclick="generateAndDownloadPdf()">Generate</button>
      </div>
    </div>
  </div>

  <div id="writing-overlay" class="writing-overlay">
  <div class="writing-title">Writing Report.</div>
  <div class="writing-subtitle">
    Please wait 4-5 minutes<span class="blinking">...</span>
  </div>
</div>


  <script>
    async function generateAndDownloadPdf() {
      const topic = document.getElementById('topic').value;
      const userInstructions = document.getElementById('user_instructions').value;
      const overlay = document.getElementById('writing-overlay');

      overlay.style.display = 'flex';

      try {
        const response = await fetch('/generate_and_download_pdf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, user_instructions: userInstructions })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = 'generated_report.pdf';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        overlay.style.display = 'none';
        alert("Report downloaded successfully.");
      } catch (error) {
        console.error('Error generating report:', error);
        overlay.style.display = 'none';
        alert("Error: " + error.message);
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      const newTheme = html.dataset.theme === 'dark' ? 'light' : 'dark';
      html.dataset.theme = newTheme;
      localStorage.setItem('theme', newTheme);
    }

    // Set saved theme
    document.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.dataset.theme = savedTheme;
    });
  </script>
</body>
</html>
